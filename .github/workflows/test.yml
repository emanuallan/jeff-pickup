name: Test

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: pickup-platform

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Placeholders for `next build` prerender — no real Supabase connection in CI.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-build-placeholder
      NEXT_PUBLIC_ROOT_DOMAIN: organizr.co
      SUPABASE_SERVICE_ROLE_KEY: ci-build-placeholder
      CRON_SECRET: ci-build-placeholder
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pickup-platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
